name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-revista:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install project dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Astro image processing
        uses: actions/cache@v5
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-images-${{ hashFiles('src/content/**/*.jpg', 'src/content/**/*.png', 'src/content/**/*.jpeg') }}
          restore-keys: |
            ${{ runner.os }}-astro-images-

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
